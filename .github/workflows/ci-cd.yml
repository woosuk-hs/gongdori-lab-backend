name: 🚀 Gongdori CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Gradle 실행 권한
        run: chmod +x gradlew

      - name: 🛠️ 빌드
        run: |
          echo "🔨 빌드 시작"
          ./gradlew clean build -x test
          echo "✅ 빌드 완료"

      - name: 🐳 Docker 로그인
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 📦 Docker 이미지 빌드
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/gongdori-server:latest .

      - name: 🚀 Docker Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/gongdori-server:latest

      - name: 🖥️ 서버 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "📥 최신 이미지 pull"
            docker pull ${{ secrets.DOCKER_USERNAME }}/gongdori-server:latest

            echo "🛑 기존 컨테이너 종료"
            docker-compose down || true

            echo "🚀 재실행"
            docker-compose up -d

            echo "🧹 이미지 정리"
            docker image prune -f

            echo "✅ 배포 완료"